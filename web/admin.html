<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendmansun Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; }
        th, td { border: 1px solid #334155; padding: 12px; text-align: left; }
        th { background: #38bdf8; color: #0f172a; }
        .btn { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin-right: 5px; }
        .btn-excel { background: #22c55e; color: white; margin-bottom: 10px; }
        .btn-approve { background: #10b981; color: white; }
        .btn-reject { background: #ef4444; color: white; }
        .btn-broadcast { background: #38bdf8; color: #0f172a; width: 100%; margin-top: 10px; }
        input, textarea { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="card" style="text-align: center; width: 300px;">
        <h3>Admin Login</h3>
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
        <button class="btn btn-approve" onclick="checkPass()" style="width: 100%; margin-top: 10px;">Login</button>
        <p id="errorMsg" style="color: #ef4444; display: none; font-size: 12px; margin-top: 10px;">Wrong Password!</p>
    </div>
</div>

<div id="adminContent" style="display: none;">
    <h2>Trendmansun Admin Dashboard</h2>

    <div class="card">
        <h3>📢 Broadcast Message to All Users</h3>
        <textarea id="broadcastMsg" placeholder="Type your message here..."></textarea>
        <button id="broadcastBtn" class="btn btn-broadcast" onclick="sendBroadcast()">Send Message to All</button>
    </div>

    <div class="card">
        <h3>👥 User Database</h3>
        <button class="btn btn-excel" onclick="exportToExcel('userTable', 'Users')">Download Users Excel</button>
        <table id="userTable">
            <thead>
                <tr><th>User ID</th><th>Name</th><th>Balance</th><th>Refers</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="card">
        <h3>💰 Pending Withdrawals</h3>
        <button class="btn btn-excel" onclick="exportToExcel('withdrawTable', 'Withdrawals')">Download Withdrawals Excel</button>
        <table id="withdrawTable">
            <thead>
                <tr><th>Name</th><th>UPI ID</th><th>Amount</th><th>Status</th><th>Action</th></tr>
            </thead>
            <tbody id="withdrawBody"></tbody>
        </table>
    </div>
</div>

<script>
    // 1. CONFIGURATION
    const firebaseConfig = { projectId: "refer-erin" }; 
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const BOT_TOKEN = "7928266949:AAHqGiztgRNNGJ7u1jznA2ZuS98hshx8hXU"; // [cite: 2026-02-06]

    // 2. PASSWORD CHECK
    function checkPass() {
        const pass = document.getElementById('adminPass').value;
        if (pass === "Trendmansun@2026") {
            document.getElementById('loginOverlay').style.display = "none";
            document.getElementById('adminContent').style.display = "block";
            loadData();
        } else {
            document.getElementById('errorMsg').style.display = "block";
        }
    }

    // 3. LOAD DATA
    async function loadData() {
        // Load Users
        const usersSnap = await db.collection("users").get();
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = "";
        usersSnap.forEach(doc => {
            const d = doc.data();
            tableBody.innerHTML += `<tr><td>${doc.id}</td><td>${d.name || 'User'}</td><td>${d.balance || 0}</td><td>${d.referCount || 0}</td></tr>`;
        });

        // Load Withdrawals
        const withdrawSnap = await db.collection("withdrawals").orderBy("date", "desc").get();
        const withdrawBody = document.getElementById('withdrawBody');
        withdrawBody.innerHTML = "";
        withdrawSnap.forEach(doc => {
            const d = doc.data();
            withdrawBody.innerHTML += `
                <tr>
                    <td>${d.userName || 'Unknown'}</td>
                    <td>${d.upi || 'N/A'}</td>
                    <td>${d.amount || 0}</td>
                    <td id="status-${doc.id}">${d.status || 'pending'}</td>
                    <td>
                        <button class="btn btn-approve" onclick="updateStatus('${doc.id}', 'Success')">Approve</button>
                        <button class="btn btn-reject" onclick="updateStatus('${doc.id}', 'Rejected')">Reject</button>
                    </td>
                </tr>`;
        });
        // Status Update karne ke liye function

    const msg = document.getElementById('broadcastMsg').value;
    if(!msg) return alert("Message likhein!");
    
    // Yahan aap apna bot notification logic daal sakte hain
    alert("Message sent to all users (Feature Coming Soon!)");
}

    }

    // 4. BROADCAST FUNCTION
    async function sendBroadcast() {
        const msg = document.getElementById('broadcastMsg').value;
        const btn = document.getElementById('broadcastBtn');
        if (!msg) return alert("Message cannot be empty!");
        
        btn.disabled = true;
        btn.innerText = "Sending... Please wait";

        const usersSnap = await db.collection("users").get();
        let successCount = 0;

        for (const doc of usersSnap.docs) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${doc.id}&text=${encodeURIComponent(msg)}`);
                successCount++;
            } catch (e) { console.error("Error for " + doc.id); }
        }

        alert(`✅ Broadcast complete! Sent to ${successCount} users.`);
        btn.disabled = false;
        btn.innerText = "Send Message to All";
        document.getElementById('broadcastMsg').value = "";
    }

    // 5. UPDATE WITHDRAWAL STATUS
    async function updateStatus(id, newStatus) {
        await db.collection("withdrawals").doc(id).update({ status: newStatus });
        document.getElementById(`status-${id}`).innerText = newStatus;
        alert("Status Updated to " + newStatus);
    }

    // 6. EXCEL EXPORT
    function exportToExcel(tableId, fileName) {
        const table = document.getElementById(tableId);
        const wb = XLSX.utils.table_to_book(table, { sheet: "Sheet1" });
        XLSX.writeFile(wb, `Trendmansun_${fileName}.xlsx`);
    }
</script>
</body>
</html>
