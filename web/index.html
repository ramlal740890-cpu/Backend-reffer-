<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendmansun Rewards Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-bg: #0a0e17; --card-bg: #111827; --text-color: #f3f4f6; --neon-blue: #00d2ff; --neon-green: #39ff14; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--primary-bg); color: var(--text-color); margin: 0; padding-bottom: 20px; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        
        /* Overlay Style */
        #subscriptionOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary-bg); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box; }

        /* Card Styles */
        .action-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #1f2937; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn { border: none; padding: 12px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; display: block; width: 100%; margin-top: 10px; color: white; text-decoration: none; text-align: center; }
        .btn-blue { background: linear-gradient(45deg, var(--neon-blue), #3a7bd5); }
        .btn-green { background: linear-gradient(45deg, var(--neon-green), #2ecc71); color: #000; }
        .btn-ad { background: linear-gradient(45deg, #f39c12, #e67e22); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #1f2937; }
        .stat-value { font-size: 24px; font-weight: bold; color: var(--neon-blue); }
        
        input { width: 100%; padding: 12px; background: #1f2937; border: 1px solid #374151; border-radius: 8px; color: white; margin-bottom: 10px; box-sizing: border-box; }
        
        /* Profile Header */
        .profile-header { display: flex; align-items: center; gap: 15px; background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        #userPhoto { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--neon-blue); }
    </style>
</head>
<body>

<div id="subscriptionOverlay">
    <h2 style="color: var(--neon-blue);">🚀 Trendmansun Community</h2>
    <p>Please follow us to unlock earning features!</p>
    
    <a href="https://www.youtube.com/@Trendmansun" target="_blank" class="btn" style="background: #ff0000;"><i class="fab fa-youtube"></i> Subscribe YouTube</a>
    <a href="https://www.instagram.com/trendmansun" target="_blank" class="btn" style="background: linear-gradient(45deg, #f09433, #bc1888);"><i class="fab fa-instagram"></i> Follow Instagram</a>
    <a href="https://www.facebook.com/profile.php?id=61572737445421" target="_blank" class="btn" style="background: #1877f2;"><i class="fab fa-facebook"></i> Follow Facebook</a>
    
    <button onclick="verifySub()" class="btn btn-blue" style="margin-top: 25px;">✅ I Have Joined - Open Bot</button>
</div>

<div class="container">
    <div class="profile-header">
        <img id="userPhoto" src="https://via.placeholder.com/60" alt="Profile">
        <div>
            <div id="userName" style="font-weight: bold; font-size: 18px;">User Profile</div>
            <div id="joinedAt" style="font-size: 12px; color: #9ca3af;">Loading...</div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="balanceVal">0</div>
            <div style="font-size: 12px; color: #9ca3af;">Your Points</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="refersVal">0</div>
            <div style="font-size: 12px; color: #9ca3af;">Total Refers</div>
        </div>
    </div>

    <div class="action-card">
        <h3>🎁 Daily Rewards</h3>
        <button id="dailyBtn" class="btn btn-green" onclick="claimDaily()"><i class="fas fa-gift"></i> Claim Daily Bonus (10 Pts)</button>
    </div>

    <div class="action-card">
        <h3>📺 Watch & Earn</h3>
        <button id="watchAdBtn" class="btn btn-ad" onclick="watchAd()"><i class="fas fa-tv"></i> Watch Video Ad (10 Pts)</button>
    </div>

    <div class="action-card">
        <h3>👥 Refer Friends (50 Points)</h3>
        <input type="text" id="inviteInput" readonly value="Loading Link...">
        <div style="display: flex; gap: 10px;">
            <a id="waShare" class="btn" style="background: #25d366;"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <a id="tgShare" class="btn" style="background: #0088cc;"><i class="fab fa-telegram"></i> Telegram</a>
        </div>
    </div>

    <div class="action-card">
        <h3>💰 Withdraw Points</h3>
        <input type="text" id="upiId" placeholder="Enter UPI ID (e.g. name@apl)">
        <button id="withdrawBtn" class="btn btn-blue" onclick="sendWithdraw()"><i class="fas fa-paper-plane"></i> Request Withdrawal</button>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const firebaseConfig = { projectId: "refer-erin" }; 
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const tg = window.Telegram.WebApp;
    tg.expand();
    const user = tg.initDataUnsafe.user;

    const AD_LINK = "https://horizontallyresearchpolar.com/agtpyhx7x?key=110b06db373e8440c1e41ae528a7a39c";

    // --- FORCE JOIN LOGIC ---
    function verifySub() {
        localStorage.setItem('trendmansun_joined', 'true');
        document.getElementById('subscriptionOverlay').style.display = 'none';
    }

    window.onload = function() {
        if (!localStorage.getItem('trendmansun_joined')) {
            document.getElementById('subscriptionOverlay').style.display = 'flex';
        }
        loadUserData();
    };

    // --- DATA LOADING ---
    async function loadUserData() {
        if (!user) return;
        document.getElementById('userName').innerText = user.first_name;
        document.getElementById('userPhoto').src = user.photo_url || "https://via.placeholder.com/60";

        const inviteUrl = `https://t.me/Refer_Erin_bot?start=${user.id}`;
        document.getElementById('inviteInput').value = inviteUrl;
        document.getElementById('waShare').href = `whatsapp://send?text=Earn Money! Join now: ${inviteUrl}`;
        document.getElementById('tgShare').href = `https://t.me/share/url?url=${inviteUrl}&text=Earn Free Rewards!`;

        const userRef = db.collection("users").doc(user.id.toString());
        userRef.onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('balanceVal').innerText = data.balance || 0;
                document.getElementById('refersVal').innerText = data.referCount || 0;
            } else {
                userRef.set({ name: user.first_name, balance: 0, referCount: 0, joinedAt: new Date() });
            }
        });
    }

    // --- EARNING FUNCTIONS ---
    function watchAd() {
        window.open(AD_LINK, '_blank');
        const userRef = db.collection("users").doc(user.id.toString());
        userRef.update({ balance: firebase.firestore.FieldValue.increment(10) });
        alert("Success! 10 Points Added.");
    }

    async function claimDaily() {
        const userRef = db.collection("users").doc(user.id.toString());
        userRef.update({ balance: firebase.firestore.FieldValue.increment(10) });
        alert("Daily Bonus Claimed!");
    }

    // --- WITHDRAWAL LOGIC ---
    async function sendWithdraw() {
        const upi = document.getElementById('upiId').value;
        const balance = parseInt(document.getElementById('balanceVal').innerText);

        if (!upi || upi.length < 5) return alert("Pahle UPI ID sahi se daalein!");
        if (balance < 100) return alert("Withdrawal ke liye minimum 100 points chahiye!");

        const btn = document.getElementById('withdrawBtn');
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            await db.collection("withdrawals").add({
                userId: user.id,
                userName: user.first_name,
                upi: upi,
                amount: balance,
                status: "pending",
                date: new Date()
            });
            await db.collection("users").doc(user.id.toString()).update({ balance: 0 });
            alert("✅ Withdrawal Request Sent Successfully!");
            btn.innerText = "Request Withdrawal";
            btn.disabled = false;
        } catch (e) {
            alert("Error sending request!");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
