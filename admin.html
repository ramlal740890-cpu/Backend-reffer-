<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendmansun Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #222; }
        th, td { border: 1px solid #444; padding: 12px; text-align: left; }
        th { background: #00d2ff; color: black; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-excel { background: #28a745; color: white; }
    </style>
</head>
<body>

<div class="header">
    <h2>User Earnings & Withdrawals</h2>
    <button class="btn btn-excel" onclick="exportToExcel()">Download Excel File</button>
</div>

<table id="userTable">
    <thead>
        <tr>
            <th>User ID</th>
            <th>Name</th>
            <th>Balance (Points)</th>
            <th>Total Refers</th>
            <th>UPI ID</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="tableBody">
        </tbody>
</table>

<script>
    // 1. Firebase Config (Wahi dalein jo index.html mein hai)
    const firebaseConfig = { projectId: "refer-erin" }; 
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. Data Load Karein
    async function loadData() {
        const tableBody = document.getElementById('tableBody');
        const snapshot = await db.collection("users").get();
        
        tableBody.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            const row = `<tr>
                <td>${doc.id}</td>
                <td>${data.name || 'User'}</td>
                <td>${data.balance || 0}</td>
                <td>${data.referCount || 0}</td>
                <td>${data.lastUpi || 'N/A'}</td>
                <td>Active</td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    // 3. Excel Download Logic
    function exportToExcel() {
        const table = document.getElementById("userTable");
        const wb = XLSX.utils.table_to_book(table, {sheet: "Sheet1"});
        XLSX.writeFile(wb, "Trendmansun_User_Data.xlsx");
    }

    loadData();
</script>

</body>
</html>
