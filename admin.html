<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Real Case Earning</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #loginOverlay { background: #1e293b; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2563eb; }
        #adminContent { display: none; width: 95%; max-width: 1000px; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #334155; }
        .status-pending { color: #fbbf24; }
        .status-success { color: #10b981; }
        .btn-approve { background: #10b981; width: auto; padding: 5px 10px; margin-right: 5px; }
        .btn-reject { background: #ef4444; width: auto; padding: 5px 10px; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <h2>Admin Login</h2>
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
        <button onclick="checkPass()">Login</button>
        <p id="errorMsg" style="color: #ef4444; display: none; margin-top: 10px;">Incorrect Password!</p>
    </div>

    <div id="adminContent">
        <h1>🚀 Admin Dashboard</h1>
        
        <div class="card">
            <h3>📢 Broadcast Message</h3>
            <input type="text" id="broadcastMsg" placeholder="Type message to all users...">
            <button onclick="sendBroadcast()" id="broadcastBtn">Send Message to All</button>
        </div>

        <div class="card">
            <h3>🏦 Pending Withdrawals</h3>
            <button onclick="exportToExcel('withdrawTable', 'Withdrawals')" style="width: auto; margin-bottom: 10px; background: #10b981;">Export to Excel</button>
            <table id="withdrawTable">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>UPI ID</th>
                        <th>Points (₹)</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="withdrawBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // 1. CONFIGURATION
        const firebaseConfig = { projectId: "refer-erin" }; 
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const BOT_TOKEN = "8711347335:AAFdZV11arLIR898b1Sh2zW7Ajdqp_P8RHM";

        // 2. LOGIN LOGIC
        function checkPass() {
            const pass = document.getElementById('adminPass').value;
            if (pass === "Trendmansun@2026") {
                document.getElementById('loginOverlay').style.display = "none";
                document.getElementById('adminContent').style.display = "block";
                loadWithdrawals();
            } else {
                document.getElementById('errorMsg').style.display = "block";
            }
        }

        // 3. LOAD DATA
        async function loadWithdrawals() {
            const snapshot = await db.collection('withdrawals').orderBy('date', 'desc').get();
            const body = document.getElementById('withdrawBody');
            body.innerHTML = "";
            
            snapshot.forEach(doc => {
                const d = doc.data();
                const row = `<tr>
                    <td>${d.userName || 'User'}</td>
                    <td>${d.upi || 'N/A'}</td>
                    <td>${d.amount} (₹${(d.amount/20).toFixed(2)})</td>
                    <td class="status-${d.status}" id="status-${doc.id}">${d.status}</td>
                    <td>
                        <button class="btn-approve" onclick="updateStatus('${doc.id}', 'success')">Approve</button>
                        <button class="btn-reject" onclick="updateStatus('${doc.id}', 'rejected')">Reject</button>
                    </td>
                </tr>`;
                body.innerHTML += row;
            });
        }

        // 4. UPDATE STATUS
        async function updateStatus(id, newStatus) {
            await db.collection('withdrawals').doc(id).update({ status: newStatus });
            document.getElementById(`status-${id}`).innerText = newStatus;
            document.getElementById(`status-${id}`).className = `status-${newStatus}`;
            alert("Status Updated!");
        }

        // 5. BROADCAST MESSAGE
        async function sendBroadcast() {
            const msg = document.getElementById('broadcastMsg').value;
            if(!msg) return alert("Message khali hai!");
            
            const btn = document.getElementById('broadcastBtn');
            btn.disabled = true;
            btn.innerText = "Sending...";

            const users = await db.collection('users').get();
            let count = 0;

            for (const user of users.docs) {
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${user.id}&text=${encodeURIComponent(msg)}&parse_mode=HTML`);
                    count++;
                } catch(e) {}
            }

            alert(`Done! ${count} users ko message bhej diya gaya.`);
            btn.disabled = false;
            btn.innerText = "Send Message to All";
        }

        // 6. EXCEL EXPORT
        function exportToExcel(tableID, filename) {
            const table = document.getElementById(tableID);
            const wb = XLSX.utils.table_to_book(table, { sheet: "Sheet1" });
            XLSX.writeFile(wb, `Trendmansun_${filename}.xlsx`);
        }
    </script>
</body>
</html>
